# @generated by gh-workflow (Rust) - do not edit by hand.
name: autofix.ci
env:
  RUSTFLAGS: -Dwarnings
on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - v*
jobs:
  lint:
    name: Lint Fix
    runs-on: ubuntu-latest
    permissions:
      contents: read
    concurrency:
      group: autofix-${{github.ref}}
      cancel-in-progress: false
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
      - name: Setup Rust Toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with: 
          toolchain: nightly
          components: clippy, rustfmt
          cache: true
          cache-directories: |-
            ~/.cargo/registry
            ~/.cargo/git
            target
      - name: Cargo Fmt
        run: cargo +nightly fmt --all
      - name: Cargo Clippy
        run: cargo +nightly clippy --fix --allow-dirty --all-features --workspace -- -D warnings
      - name: auto-fix
        uses: autofix-ci/action@v1