name: CI
on:
  workflow_call:
    secrets:
      access-token:
        description: "A token passed from the caller workflow"
        required: false
      token-access:
        description: "A token passed from the caller workflow"
        required: true
jobs:
  reusable_job_nothing:
    name: Reusable Job
    uses: ./.github/workflows/reusable.yml
    with:
      param1: ${{ inputs.access-token }}
      param2: value
  reusable_job_specific:
    name: Reusable Job Specific Secrets
    uses: ./.github/workflows/reusable.yml
    secrets:
      donttell: ${{ secrets.access-token }}
      notelling: ${{ secrets.token-access }}
  reusable_job:
    name: Reusable Job
    uses: ./.github/workflows/reusable.yml
    secrets: inherit
